; ============================================================
;  MSPM0G3519 一键烧录配置   ——   通常你只需要改下面这一行 port
; ============================================================

[serial]
; 虚拟串口号：设备管理器 → 端口(COM 和 LPT) 里看到的那个，比如 COM7 / COM12
port           = COM7
; ROM BSL 固定 9600，一般不用改
baudrate       = 9600
; 每次串口读取超时（秒）。擦除/大包偶尔慢，5 秒稳妥
read_timeout_s = 5

[bsl]
; 是否发 0x22 触发固件软件跳 BSL。
;   true  = 让运行中的固件自己跳进 BSL（需要固件已实现 0x22 监听器）
;   false = 不发 0x22（你已用硬件方式让设备进 BSL 时选这个）
send_invoke  = true
invoke_byte  = 0x22
; 发完 0x22 后等设备复位进 BSL 的时间（秒）
invoke_delay_s = 0.3

; 软解锁口令：32 字节十六进制。默认全 FF = 未设密码时的软解锁口令。
; 留空亦等于全 FF。若你给芯片设过 BSL 密码，改成对应的 32 字节。
password = FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF FF

; 烧录前是否全片擦除（正常烧录保持 true）
mass_erase = true
; 烧完是否立刻复位运行新固件
start_app  = true

[build]
; 烧录前是否先编译（用户硬性前提：编译不过就不烧）。正常保持 true。
run_build = true
; 编译命令（经 PowerShell 执行）。工程约定即 rtk make。
build_cmd = rtk make -C Debug all
; 待烧固件（相对仓库根）。ticlang 构建产物为 Intel HEX。
hex_file  = Debug/2026_Diansai.hex
